vllm_config:
  model: "Qwen/Qwen3-30B-A3B"
  tensor_parallel_size: 1
  dtype: half
  load_format: "dummy"
  block_size: 16
  max_num_batched_tokens: 8192
  max_num_seqs: 256
  gpu_memory_utilization: 0.9
  enforce_eager: true
  skip_tokenizer_init: true
  enable_prefix_caching: false
  generation_config: "vllm"
  hf_overrides:
    num_hidden_layers: 1
profile_tp: [1, 2]
tp_modifications:
  - intermediate_size
  - num_attention_heads
  - num_key_value_heads
  - vocab_size
layers:
  Qwen3MoeForCausalLM:
    VocabParallelEmbedding: embedding
    Qwen3MoeDecoderLayer:
      RMSNorm: layernorm
      Qwen3MoeAttention:
        QKVParallelLinear: qkv_projection
        RotaryEmbedding: rope
        Attention: attention
        RowParallelLinear: o_projection
        RMSNorm: qk_norm
      Qwen3MoeSparseMoeBlock: moe
    RMSNorm: final_layernorm
  LogitsProcessor: lm_head
  Sampler: sampler
layer_modes:
  general:
    - embedding
    - qkv_projection
    - rope
    - o_projection
    - qk_norm
  tp_agnostic:
    - layernorm
    - final_layernorm
  lm_head:
    - lm_head
  sampler:
    - sampler
  attention:
    - attention
  moe:
    - moe
